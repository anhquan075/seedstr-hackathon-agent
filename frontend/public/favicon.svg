<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#050505"/>
  
  <!-- Glow effect definitions -->
  <defs>
    <filter id="fire-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="fireGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerFireGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffff66;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ffaa00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3300;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer flame - main body (red/orange) -->
  <path d="M 128 50 Q 105 75 105 105 Q 105 140 128 180 Q 151 140 151 105 Q 151 75 128 50 Z" 
        fill="url(#fireGradient)" filter="url(#fire-glow)"/>
  
  <!-- Inner flame - bright core (yellow/orange) -->
  <path d="M 128 60 Q 115 80 115 105 Q 115 135 128 165 Q 141 135 141 105 Q 141 80 128 60 Z" 
        fill="url(#innerFireGradient)" filter="url(#fire-glow)"/>
  
  <!-- Torch handle - vertical line (cyan accent) -->
  <rect x="121" y="165" width="14" height="60" fill="#00f3ff" opacity="0.8"/>
  
  <!-- Handle accent lines -->
  <line x1="118" y1="175" x2="138" y2="175" stroke="#ff00ff" stroke-width="2" opacity="0.6"/>
  <line x1="118" y1="190" x2="138" y2="190" stroke="#ff00ff" stroke-width="2" opacity="0.6"/>
  <line x1="118" y1="205" x2="138" y2="205" stroke="#ff00ff" stroke-width="2" opacity="0.6"/>
  
  <!-- Flame flicker effects (top) -->
  <path d="M 110 65 Q 108 80 110 90" stroke="#ffff66" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 146 70 Q 148 85 146 95" stroke="#ffff66" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Lightning bolt accent (right side - shows power) -->
  <path d="M 155 100 L 165 110 L 160 115 L 170 130" 
        stroke="#00f3ff" stroke-width="2" fill="none" opacity="0.7" filter="url(#fire-glow)"/>
  
  <!-- Prometheus symbol - circle with dot in center (wisdom) -->
  <circle cx="128" cy="120" r="12" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.6"/>
  <circle cx="128" cy="120" r="3" fill="#ffff66" filter="url(#fire-glow)"/>
  
  <!-- Outer glow ring (cyan) -->
  <circle cx="128" cy="128" r="80" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.3"/>
</svg>
