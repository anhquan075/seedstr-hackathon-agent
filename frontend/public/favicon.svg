<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Core gradient: vibrant orange to deep red -->
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4D00;stop-opacity:1" />
    </linearGradient>
    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Geometric Flame (Subtle) -->
  <path d="M128 30 L190 150 L128 190 L66 150 Z" fill="#FF4D00" opacity="0.4" />
  
  <!-- Inner Geometric Flame (Bright) -->
  <path d="M128 50 L160 130 L128 160 L96 130 Z" fill="#FFCC00" opacity="0.8" filter="url(#neonGlow)" />
  
  <!-- The AI Core (Rotating Square) -->
  <rect x="93" y="125" width="70" height="70" rx="6" transform="rotate(45 128 160)" 
        fill="url(#coreGradient)" stroke="#FFFFFF" stroke-width="4" filter="url(#neonGlow)" />
  
  <!-- Circuitry Accents -->
  <circle cx="128" cy="160" r="4" fill="white" />
  <path d="M128 160 L128 100 M128 160 L188 160 M128 160 L68 160 M128 160 L128 220" 
        stroke="white" stroke-width="3" opacity="0.6" stroke-linecap="round" />
  
  <!-- Bottom Energy Pulse -->
  <ellipse cx="128" cy="235" rx="80" ry="12" fill="none" stroke="#FF9900" stroke-width="2" opacity="0.2">
    <animate attributeName="rx" values="60;90;60" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite" />
  </ellipse>
</svg>
