name: Jest Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/test.yml'
      - 'package.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/test.yml'
      - 'package.json'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build backend
        run: npm run build
      
      - name: Run tests
        run: npm test -- --coverage
      
      - name: Check coverage threshold
        run: |
          npm test -- --coverage --collectCoverageFrom='backend/src/**/*.ts' --coverageThreshold='{"global":{"branches":85,"functions":85,"lines":85,"statements":85}}'
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const global = coverage.total;
            const comment = `## Test Results
            
            | Metric | Coverage |
            |--------|----------|
            | Lines | ${global.lines.pct.toFixed(2)}% |
            | Statements | ${global.statements.pct.toFixed(2)}% |
            | Functions | ${global.functions.pct.toFixed(2)}% |
            | Branches | ${global.branches.pct.toFixed(2)}% |
            
            ✅ All tests passing`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true
